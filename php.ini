; Keamanan session
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1
session.use_only_cookies = 1

; Batasan upload & post
upload_max_filesize = 2M
post_max_size = 2M

; Tampilkan error di development, sembunyikan di production
display_errors = Off
log_errors = On

; Timezone
date.timezone = Asia/Jakarta

; Memory limit
memory_limit = 64M